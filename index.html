<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demokratie braucht Bewegung</title>
    
    <!-- Google Fonts für eine saubere Grotesk-Schrift (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <!-- Three.js und OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        /* Minimalistisches, minimalistisches Design (Grotesk & Weißer Hintergrund) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: #000000;
        }

        body {
            background-color: #ffffff;
            overflow: hidden; /* Verhindert Scrollbalken */
            height: 100vh;
        }

        /* Header-Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10; /* Über der 3D-Animation */
            pointer-events: none; /* Erlaubt Klicks durch leere Bereiche des Headers */
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            pointer-events: auto;
        }

        /* Minimalistisches Dropdown */
        .nav-dropdown {
            pointer-events: auto;
        }

        select {
            background: transparent;
            border: 2px solid #000000;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
            appearance: none; /* Entfernt Standard-Pfeil */
            padding-right: 35px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        /* 3D Canvas */
        #canvas-container {
            width: 100%;
            height: 100vh;
            display: block;
        }

        /* Pop-up / Modal Style */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #ffffff;
            border: 3px solid #000000;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .close-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #333333;
        }

        /* Hintergrund-Dimmer bei offenem Pop-up */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 99;
            display: none;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Demokratie braucht Bewegung</h1>
        <div class="nav-dropdown">
            <select onchange="alert('Menü-Punkt gewählt: ' + this.value)">
                <option value="">Menü</option>
                <option value="ueber-uns">Über das Projekt</option>
                <option value="mitmachen">Mitmachen</option>
                <option value="kontakt">Kontakt</option>
            </select>
        </div>
    </header>

    <!-- Hier wird die 3D Szene hineingeladen -->
    <div id="canvas-container"></div>

    <!-- Pop-up Fenster -->
    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h2 id="modal-title">Titel des Elements</h2>
        <p id="modal-text">Hier stehen die Hintergrundinformationen zum angeklickten Objekt.</p>
        <button class="close-btn" onclick="closeModal()">Schließen</button>
    </div>

    <script>
        // --- 1. SETUP DER 3D SZENE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // Weißer Hintergrund

        // Kamera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // OrbitControls für freie 360-Grad-Drehung auf allen Achsen
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Sanftes Nachdrehen
        controls.dampingFactor = 0.05;

        // --- 2. LICHT ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // --- 3. DER RAUM & DIE ELEMENTE ---
        // Wir bauen einen "Raum" aus Linien (Wireframe-Box), damit man ihn sieht
        const roomGeometry = new THREE.BoxGeometry(5, 5, 5);
        const roomEdges = new THREE.EdgesGeometry(roomGeometry);
        const roomLine = new THREE.LineSegments(roomEdges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
        scene.add(roomLine);

        // Array für anklickbare Objekte (Interaktive Elemente im Raum)
        const interactiveObjects = [];

        // Daten für die Pop-ups
        const elementData = [
            { 
                name: "Meinungsfreiheit", 
                color: 0x000000, 
                pos: [-1.5, 0, 0],
                info: "Die Meinungsfreiheit ist ein Grundrecht und die Basis jeder demokratischen Debatte. Bewegung bedeutet hier: Laut werden und Haltung zeigen."
            },
            { 
                name: "Partizipation", 
                color: 0x333333, 
                pos: [1.5, 1, -1],
                info: "Demokratie lebt vom Mitmachen. Ob Wahlen, Demonstrationen oder Bürgerinitiativen – jede Bewegung zählt."
            },
            { 
                name: "Gleichheit", 
                color: 0x666666, 
                pos: [0, -1.5, 1],
                info: "Alle Menschen sind vor dem Gesetz gleich. Dieses Element symbolisiert das stabile Fundament, das ständig in Bewegung verteidigt werden muss."
            }
        ];

        // Elemente generieren und im Raum platzieren
        elementData.forEach((data, index) => {
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshStandardMaterial({ color: data.color });
            const cube = new THREE.Mesh(geometry, material);
            
            cube.position.set(data.pos[0], data.pos[1], data.pos[2]);
            
            // Wichtig für den Klick: Wir speichern die Infos direkt im 3D-Objekt
            cube.userData = { title: data.name, text: data.info };
            
            scene.add(cube);
            interactiveObjects.push(cube);
        });

        // --- 4. KLICK-LOGIK (RAYCASTER) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', onMouseClick, false);

        function onMouseClick(event) {
            // Berechnet die Mausposition im normalisierten 2D-Raum (-1 bis +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Strahl von der Kamera durch die Mausposition werfen
            raycaster.setFromCamera(mouse, camera);

            // Prüfen, ob der Strahl unsere interaktiven Objekte trifft
            const intersects = raycaster.intersectObjects(interactiveObjects);

            if (intersects.length > 0) {
                // Das erste getroffene Objekt auswählen
                const clickedObject = intersects[0].object;
                openModal(clickedObject.userData.title, clickedObject.userData.text);
            }
        }

        // --- 5. POP-UP STEUERUNG ---
        const modal = document.getElementById('modal');
        const overlay = document.getElementById('overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');

        function openModal(title, text) {
            modalTitle.innerText = title;
            modalText.innerText = text;
            modal.classList.add('active');
            overlay.classList.add('active');
            controls.enabled = false; // Deaktiviert die Raumdrehung, während das Pop-up offen ist
        }

        function closeModal() {
            modal.classList.remove('active');
            overlay.classList.remove('active');
            controls.enabled = true; // Reaktiviert die Drehung
        }

        // --- 6. ANIMATION & RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Optionale minimale Eigenrotation der inneren Würfel für etwas "Bewegung"
            interactiveObjects.forEach(obj => {
                obj.rotation.x += 0.005;
                obj.rotation.y += 0.005;
            });

            controls.update(); // Erforderlich für Damping
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
