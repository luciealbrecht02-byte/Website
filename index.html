<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alle für alle — Demokratie braucht Bewegung</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: #000000;
        }

        body {
            background-color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- NAVIGATION & HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
            background-color: transparent;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            pointer-events: auto;
            cursor: pointer;
        }

        .site-logo {
            height: 55px;
            width: auto;
            object-fit: contain;
        }

        .nav-dropdown {
            pointer-events: auto;
            display: flex;
            align-items: center;
        }

        select {
            background: transparent;
            border: none; /* Kein Rahmen */
            color: #204f9e; /* Schönes Blau */
            padding: 5px 0px 5px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
            appearance: none;
            padding-right: 20px; /* Enger Abstand zum Pfeil */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path fill='%23204f9e' d='M0 3l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right center;
        }

        select option {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- SEITEN-ARCHITEKTUR --- */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            overflow-y: auto;
            padding: 140px 30px 60px 30px;
        }

        #page-home {
            opacity: 1;
            pointer-events: auto;
            padding: 0;
            z-index: 1;
            background: transparent; 
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 500;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            display: block;
        }

        /* --- UNTERSEITEN INHALT --- */
        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .page h2 {
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin-bottom: 40px;
            line-height: 0.9;
        }

        .page p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            max-width: 650px;
        }

        /* --- POP-UPS --- */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #ffffff;
            border: 3px solid #000000;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .close-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 1999;
            display: none;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
